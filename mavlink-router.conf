[General]
ReportStats = false
DebugLogLevel = info
TcpServerPort = 5760

# --- Pixhawk serial input ---
# /dev/ttyUSB0  for USB-serial adapter (FTDI/CP210x)
# /dev/ttyACM0  for direct Pixhawk USB
# Baud must match SER_TEL1_BAUD in QGC params (default 57600)
[UartEndpoint pixhawk]
Device = /dev/ttyUSB0
Baud = 57600


# --- UDP to QGroundControl ---
# QGC auto-listens on 14550; set Address to base station IP
[UdpEndpoint qgc]
Mode = Normal
Address = 192.168.1.100
Port = 14550


# --- UDP server mode (QGC initiates) ---
# QGC: Comms Links -> Add -> UDP -> port 14551, host = Jetson IP
#[UdpEndpoint qgc_server]
#Mode = Server
#Address = 0.0.0.0
#Port = 14551
